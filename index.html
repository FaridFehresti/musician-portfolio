<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='11' fill='%23161616' stroke='%23b0b0b0' stroke-width='1'/%3E%3Ccircle cx='12' cy='12' r='6' fill='none' stroke='%23808080' stroke-width='0.6'/%3E%3Ccircle cx='12' cy='12' r='2' fill='%23c8c8c8'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      /* Apply saved theme before paint to avoid a flash */
      (function () {
        try {
          var t = localStorage.getItem('artist-portfolio-theme');
          var ok = ['aurora', 'sandstone', 'slate', 'midnight', 'synthwave'];
          document.documentElement.setAttribute('data-theme', ok.indexOf(t) >= 0 ? t : 'midnight');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'midnight');
        }
      })();
    </script>
    <title>Artist Portfolio — Music &amp; Sound</title>
    <meta name="description" content="Electronic, House, Techno and Ambient music. 100+ tracks, all free. Listen now." />
    <!-- Default share-card tags. In production the server overrides these per
         request with the CMS artist name + logo (see server/index.js). -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Artist Portfolio — Music &amp; Sound" />
    <meta property="og:description" content="Listen free — no account, no subscription." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Artist Portfolio — Music &amp; Sound" />
    <meta name="twitter:description" content="Listen free — no account, no subscription." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700;1,900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
